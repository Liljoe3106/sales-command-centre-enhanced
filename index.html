<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Command Centre</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Include SheetJS from CDN for XLSX parsing -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sales Command Centre</h1>
        </header>
        <div class="controls">
            <input type="file" id="file-input" accept=".xlsx,.xls" />
            <select id="sheet-select" hidden></select>
            <button id="download-btn" hidden>Download Updated Spreadsheet</button>
        </div>
        <div id="table-container" class="table-container"></div>
        <p id="status" class="status"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
